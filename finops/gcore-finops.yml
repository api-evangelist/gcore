provider: Gcore
providerId: gcore
created: '2026-06-20'
modified: '2026-06-20'
reconciled: false
tags:
- Edge Cloud
- CDN
- Streaming
- Edge AI
- Infrastructure
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Gcore platform spend. Gcore bills each service on its own
  usage model: CDN and Streaming on delivered traffic (per GB, regional);
  Cloud compute per instance hour with GPU billed per second; Object Storage
  per GB-hour stored; DNS per query volume / plan; Everywhere Inference per
  second of compute; FastEdge per invocation/compute. Spend is best managed by
  tagging API keys and projects per workload and mapping each metered service
  to an internal cost center.
notes: >-
  Per-unit rates vary by region and service and are subject to change; verify
  against the relevant Gcore pricing pages during reconciliation.
