meters:
- name: cdn_traffic_gb
  description: CDN delivered traffic billed per GB by regional tier.
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - resource
  - region
- name: streaming_traffic_gb
  description: Streaming (VOD/live) delivered traffic billed per GB.
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - region
- name: cloud_instance_hours
  description: Virtual machine instance hours billed by flavor and region.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - project
  - region
  - flavor
- name: cloud_gpu_seconds
  description: GPU compute billed per second of usage.
  unit: seconds
  aggregation: sum
  dimensions:
  - account
  - project
  - region
  - flavor
- name: storage_gb_hours
  description: Object storage billed per GB-hour of data stored over the month.
  unit: gb_hours
  aggregation: sum
  dimensions:
  - account
  - location
- name: dns_queries
  description: Managed DNS queries billed per million by plan.
  unit: queries
  aggregation: sum
  dimensions:
  - account
  - zone
- name: inference_compute_seconds
  description: Everywhere Inference compute billed per second by flavor.
  unit: seconds
  aggregation: sum
  dimensions:
  - account
  - project
  - deployment
- name: fastedge_invocations
  description: FastEdge serverless invocations billed per million.
  unit: invocations
  aggregation: sum
  dimensions:
  - account
  - app
principles:
- name: Visibility
  description: Pull Gcore usage/billing per service; inspect traffic GB, instance hours, GPU seconds, and stored GB-hours by region.
- name: Allocation
  description: Tag API keys and projects per workload/team; map each metered service to internal cost centers.
- name: Optimization
  description: Lean on cached CDN egress (no extra origin egress charge); right-size instances and volume types; use per-second GPU/inference billing to avoid idle GPU spend; pick the cheapest viable region tier.
- name: Accountability
  description: Assign owners per project/key; review per-service spend monthly against budget.
