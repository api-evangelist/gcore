aid: gcore
url: https://raw.githubusercontent.com/api-evangelist/gcore/refs/heads/main/apis.yml
name: Gcore
kind: company
description: Gcore is a global edge cloud, CDN, streaming, and AI infrastructure
  provider operating 210+ points of presence. A single REST platform at
  https://api.gcore.com (APIKey auth) spans content delivery, GPU cloud and
  bare-metal compute, S3-compatible object storage, managed DNS, video
  streaming and live, Everywhere Inference (edge AI), WAAP/DDoS security, and
  FastEdge serverless functions.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Edge Cloud
- CDN
- Streaming
- Edge AI
- Infrastructure
